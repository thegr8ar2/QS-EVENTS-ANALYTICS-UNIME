<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Events: Italy Interest Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #003366; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .card { background: #fff; border: 1px solid #e1e4e8; padding: 20px; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #003366; color: white; }
        tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Italy vs EU Competitors Performance</h1>
        <p>Real-time data synced directly from Google Sheets.</p>
        
        <div class="card">
            <canvas id="dashboardChart"></canvas>
        </div>

        <div class="card">
            <h2>Detailed Data Table</h2>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Year / Season</th>
                        <th>Country</th>
                        <th>Total Reg.</th>
                        <th>Italy Interest</th>
                        <th>Distinct Candidates</th>
                        <th>Top EU Comp 1</th>
                        <th>Top EU Comp 2</th>
                        <th>Italy's Rank</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data rows will be injected here dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Fetch data.json generated by your updated Apps Script
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.querySelector('#dataTable tbody');
                const labels = [];
                const interestScores = [];

                data.forEach(item => {
                    // 1. Insert rows with your exact columns
                    const row = `<tr>
                        <td>${item.eventYear}</td>
                        <td style="font-weight: bold;">${item.country}</td>
                        <td>${item.totalReg}</td>
                        <td style="color: #003366; font-weight: bold;">${item.italyInterest}</td>
                        <td>${item.distinctCandidates}</td>
                        <td>${item.euComp1}</td>
                        <td>${item.euComp2}</td>
                        <td style="font-weight: bold;">${item.italyRank}</td>
                    </tr>`;
                    tbody.innerHTML += row;

                    // 2. Prepare data for the chart
                    labels.push(item.country);
                    
                    // Convert "20%" string format to a clean number for Chart.js
                    const numericValue = parseFloat((item.italyInterest || '0').replace('%', ''));
                    interestScores.push(numericValue);
                });

                // 3. Render the chart matching the dark blue theme (#003366)
                const ctx = document.getElementById('dashboardChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Italy Interest (%)",
                            data: interestScores,
                            backgroundColor: 'rgba(0, 51, 102, 0.8)', // Theme color with opacity
                            borderColor: 'rgba(0, 51, 102, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: { 
                        responsive: true,
                        scales: { y: { beginAtZero: true } } 
                    }
                });
            })
            .catch(err => console.error("Error loading dashboard data:", err));
    </script>
</body>
</html>
