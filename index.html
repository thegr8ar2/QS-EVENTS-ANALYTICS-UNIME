<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Events: Italy Interest Analysis Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-blue: #1e3a8a;
            --primary-hover: #1e40af;
            --border-color: #e2e8f0;
            --surface-hover: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 32px 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header-card, .controls-card, .chart-card, .table-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        .header-card {
            padding: 32px;
            text-align: center;
        }

        .header-card h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .controls-card {
            padding: 16px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
        }

        .btn {
            padding: 10px 24px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-muted);
        }

        .btn.active {
            background-color: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.25);
        }

        .btn:hover:not(.active) {
            background-color: var(--surface-hover);
            color: var(--text-main);
        }

        .chart-card {
            padding: 24px;
            position: relative;
        }

        .chart-scroll-container {
            overflow-y: auto;
            max-height: 650px; 
            padding-right: 16px; 
        }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .canvas-wrapper {
            position: relative;
        }

        .table-card {
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        tbody tr {
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: var(--surface-hover);
        }
        
        .highlight-badge {
            background-color: #eff6ff;
            color: #1d4ed8;
            padding: 6px 12px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 13px;
        }

        #loading {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <div class="header-card">
            <h1>QS Events: Italy Interest Analysis Dashboard</h1>
        </div>

        <!-- Sorting Controls -->
        <div class="controls-card">
            <button id="btnSortAlpha" class="btn" onclick="handleSort('alpha')">Sort by Country (Alphabetical)</button>
            <button id="btnSortDesc" class="btn active" onclick="handleSort('desc')">Sort by Italy Interest (%) (Descending)</button>
        </div>

        <!-- Chart Container -->
        <div class="chart-card">
            <div id="loading">Fetching live data from GitHub...</div>
            <div class="chart-scroll-container" id="chartScrollArea" style="display: none;">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="interestChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="table-card">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Year / Season</th>
                        <th>Country</th>
                        <th>Total Reg.</th>
                        <th>Italy Interest</th>
                        <th>Distinct Candidates</th>
                        <th>Top EU Comp 1</th>
                        <th>Top EU Comp 2</th>
                        <th>Italy's Rank</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Table rows injected via JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // Global variables to hold data and the chart instance
        let dashboardData = [];
        let myChart = null;
        let currentSort = 'desc'; // Default sort state

        // Register the DataLabels plugin for Chart.js
        Chart.register(ChartDataLabels);

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });

        // 1. Fetch data from the Apps Script JSON file
        async function fetchData() {
            try {
                // Ensure we bust cache so it's always the latest data
                const response = await fetch(`data.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Data file not found');
                
                const rawData = await response.json();
                processData(rawData);
            } catch (error) {
                console.error("Error loading dashboard data:", error);
                document.getElementById('loading').innerText = "Unable to load data. Waiting for Google Sheets sync...";
            }
        }

        // 2. Process and clean the raw data
        function processData(rawData) {
            dashboardData = rawData.map(item => {
                const rawInterest = item.italyInterest || '0';
                let numericInterest = parseFloat(rawInterest.toString().replace('%', ''));
                
                // FIX: If Excel exported pure decimals (e.g., 0.44 instead of 44%)
                if (numericInterest > 0 && numericInterest <= 1 && !rawInterest.toString().includes('%')) {
                    numericInterest = numericInterest * 100;
                }
                
                // Clean up long floating point numbers (e.g., 44.00000001 -> 44)
                numericInterest = Math.round(numericInterest * 10) / 10;
                
                return {
                    ...item,
                    numericInterest: isNaN(numericInterest) ? 0 : numericInterest
                };
            });

            // Hide loading text and show scrollable canvas wrapper
            document.getElementById('loading').style.display = 'none';
            document.getElementById('chartScrollArea').style.display = 'block';

            // Initial render
            renderDashboard();
        }

        // 3. Handle sorting logic based on button clicks
        function handleSort(sortType) {
            currentSort = sortType;
            
            // Update button UI styles
            document.getElementById('btnSortAlpha').classList.toggle('active', sortType === 'alpha');
            document.getElementById('btnSortDesc').classList.toggle('active', sortType === 'desc');
            
            renderDashboard();
        }

        // 4. Render both Chart and Table
        function renderDashboard() {
            // Sort data array based on current state
            let sortedData = [...dashboardData];
            if (currentSort === 'desc') {
                sortedData.sort((a, b) => b.numericInterest - a.numericInterest);
            } else {
                sortedData.sort((a, b) => a.country.localeCompare(b.country));
            }

            renderChart(sortedData);
            renderTable(sortedData);
        }

        // 5. Build and render the Chart.js horizontal bar chart
        function renderChart(data) {
            // FIX FOR CLUMPING: Dynamically calculate height so every bar gets 40 pixels of space
            const requiredHeight = data.length * 40;
            document.getElementById('canvasWrapper').style.height = Math.max(requiredHeight, 400) + 'px';

            const ctx = document.getElementById('interestChart').getContext('2d');
            
            // Extract labels and data arrays
            const labels = data.map(item => item.country);
            const dataPoints = data.map(item => item.numericInterest);

            // Destroy existing chart instance to prevent overlaps when re-rendering
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Italy Interest',
                        data: dataPoints,
                        backgroundColor: '#1e3a8a', // Updated to match new UI theme
                        borderRadius: 6, // Slightly rounder bars for a modern look
                        barPercentage: 0.7,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y', 
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { font: { family: 'Inter', weight: '500' }, color: '#64748b' }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.x + '%';
                                }
                            }
                        },
                        datalabels: {
                            color: '#0f172a',
                            anchor: 'end',
                            align: 'right',
                            font: { weight: 'bold', family: 'Inter', size: 12 },
                            formatter: function(value) {
                                return value > 0 ? value + '%' : '';
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: '#e2e8f0' },
                            ticks: {
                                font: { family: 'Inter' },
                                color: '#64748b',
                                callback: function(value) {
                                    return value + '%';
                                }
                            },
                            grace: '5%' 
                        },
                        y: {
                            grid: { display: false },
                            ticks: { font: { family: 'Inter', weight: '500' }, color: '#0f172a' }
                        }
                    }
                }
            });
        }

        // 6. Render the HTML Table
        function renderTable(data) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = ''; // Clear previous rows

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: var(--text-muted);">${item.eventYear || '-'}</td>
                    <td style="font-weight: 600;">${item.country || '-'}</td>
                    <td>${item.totalReg || '0'}</td>
                    <td><span class="highlight-badge">${item.numericInterest}%</span></td>
                    <td>${item.distinctCandidates || '0'}</td>
                    <td>${item.euComp1 || '-'}</td>
                    <td>${item.euComp2 || '-'}</td>
                    <td style="font-weight: 600; color: #0f766e;">${item.italyRank || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
