<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Events: Region of Interest - ITALY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <style>
        :root {
            --qs-navy: #002452;
            --qs-yellow: #fdb913;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; }
        .chart-scroll-container { overflow-y: auto; overflow-x: hidden; padding-right: 8px; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-[1400px] mx-auto space-y-6">
        
        <header class="bg-[#002452] text-white p-8 rounded-xl shadow-lg border-b-4 border-[#fdb913]">
            <h1 class="text-3xl font-bold tracking-tight">QS Events: Region of Interest - ITALY</h1>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- 1. Interest Chart -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                <h2 class="text-xl font-bold text-[#002452] mb-4">Regional Interest in Italy (%)</h2>
                <div class="chart-scroll-container flex-grow" id="interestScrollArea">
                    <div class="relative w-full" id="interestCanvasWrapper">
                        <canvas id="interestChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- 2. Rank Distribution -->
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                <h2 class="text-xl font-bold text-[#002452] mb-1">Italy's Rank Distribution</h2>
                <p class="text-xs text-gray-500 mb-4">How often Italy places 1st, 2nd, etc. against EU competitors</p>
                <div class="relative flex-grow">
                    <canvas id="rankChart"></canvas>
                </div>
            </section>
        </div>

        <!-- 3. Detailed Data Table -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-5 border-b border-gray-200 bg-gray-50">
                <h2 class="text-lg font-bold text-[#002452]">Detailed Metrics Data</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="dataTable" style="min-width: 1000px;">
                    <thead class="bg-[#002452] text-white">
                        <tr>
                            <th class="p-4 uppercase text-xs">Year / Season</th>
                            <th class="p-4 uppercase text-xs">Country</th>
                            <th class="p-4 uppercase text-xs">Sample Pop.</th>
                            <th class="p-4 uppercase text-xs">Italy Interest</th>
                            <th class="p-4 uppercase text-xs">Distinct Candidates</th>
                            <th class="p-4 uppercase text-xs">Top EU Comp 1</th>
                            <th class="p-4 uppercase text-xs">Top EU Comp 2</th>
                            <th class="p-4 uppercase text-xs">Italy's Rank</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        async function initDashboard() {
            const response = await fetch(`data.json?t=${new Date().getTime()}`);
            const data = await response.json();
            
            // Process data for charts
            const sortedInterest = [...data].sort((a, b) => parseFloat(b.italyInterest) - parseFloat(a.italyInterest));

            renderInterestChart(sortedInterest);
            renderRankChart(data);
            renderTable(data);
        }

        function renderInterestChart(data) {
            // Set dynamic height so the chart doesn't squish
            document.getElementById('interestCanvasWrapper').style.height = (data.length * 45) + 'px';
            
            new Chart(document.getElementById('interestChart'), {
                type: 'bar',
                data: {
                    labels: data.map(i => i.country),
                    datasets: [{
                        data: data.map(i => ({ x: parseFloat(i.italyInterest), total: i.totalReg })),
                        backgroundColor: '#002452',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false }, 
                        datalabels: { 
                            anchor: 'end', 
                            align: 'right', 
                            formatter: (v) => `${v.x}% | ${v.total} Reg.`,
                            color: '#334155',
                            font: { weight: 'bold' }
                        } 
                    },
                    scales: { x: { display: false }, y: { grid: { display: false } } }
                }
            });
        }

        function renderRankChart(data) {
            const rankMap = {};
            data.forEach(i => {
                let r = i.italyRank || 'Unranked';
                if (!rankMap[r]) rankMap[r] = { count: 0, countries: [] };
                rankMap[r].count++;
                rankMap[r].countries.push(i.country);
            });
            const labels = Object.keys(rankMap).sort();
            new Chart(document.getElementById('rankChart'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: labels.map(l => rankMap[l].count),
                        backgroundColor: ['#002452', '#fdb913', '#2563eb', '#059669', '#ea580c', '#8b5cf6', '#db2777', '#0891b2', '#65a30d', '#475569']
                    }]
                },
                options: {
                    plugins: { tooltip: { callbacks: { label: c => `Count: ${c.raw} | Countries: ${rankMap[c.label].countries.join(', ')}` } } }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = data.map(i => `
                <tr>
                    <td class="p-4 whitespace-nowrap">${i.eventYear}</td>
                    <td class="p-4 font-bold text-[#002452] whitespace-nowrap">${i.country}</td>
                    <td class="p-4 whitespace-nowrap">${i.totalReg}</td>
                    <td class="p-4 font-bold text-blue-600 whitespace-nowrap">${i.italyInterest}</td>
                    <td class="p-4 whitespace-nowrap">${i.distinctCandidates}</td>
                    <td class="p-4 whitespace-nowrap">${i.euComp1}</td>
                    <td class="p-4 whitespace-nowrap">${i.euComp2}</td>
                    <td class="p-4 font-bold whitespace-nowrap">${i.italyRank}</td>
                </tr>
            `).join('');
        }

        initDashboard();
    </script>
</body>
</html>
