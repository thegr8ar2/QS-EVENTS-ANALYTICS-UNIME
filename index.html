<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Events: Region of Interest - ITALY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { --qs-navy: #002452; --qs-yellow: #fdb913; }
        .bg-qs-navy { background-color: var(--qs-navy); }
        .text-qs-navy { color: var(--qs-navy); }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="bg-qs-navy text-white p-8 rounded-lg shadow-md border-b-4 border-[#fdb913]">
            <h1 class="text-3xl font-bold">QS Events: Region of Interest - ITALY</h1>
            <p class="text-blue-100 mt-2">Sample Period: 2024-2027 Aggregate Data</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Regional Interest Chart -->
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-qs-navy mb-4">Regional Interest (%)</h2>
                <div class="relative h-[600px] overflow-y-auto">
                    <canvas id="interestChart"></canvas>
                </div>
            </div>
            <!-- Rank Distribution -->
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-qs-navy mb-4">Italy's Rank Distribution</h2>
                <canvas id="rankChart" class="max-h-[500px]"></canvas>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-200 bg-gray-50">
                <h2 class="text-lg font-bold text-qs-navy">Detailed Metrics Data</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-qs-navy text-white">
                        <tr>
                            <th class="p-4">Year / Season</th>
                            <th class="p-4">Country</th>
                            <th class="p-4">Sample Pop.</th>
                            <th class="p-4">Interest (%)</th>
                            <th class="p-4">Rank</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                
                // Sort by Interest Descending
                const processed = data.map(item => ({
                    ...item,
                    pct: parseFloat(String(item.italyInterest).replace('%', '')) * (item.italyInterest.includes('%') ? 1 : 100)
                })).sort((a, b) => b.pct - a.pct);

                // --- Bar Chart ---
                const wrapper = document.querySelector('#interestChart').parentNode;
                wrapper.style.height = (processed.length * 40) + 'px';
                
                new Chart(document.getElementById('interestChart'), {
                    type: 'bar',
                    data: {
                        labels: processed.map(i => i.country),
                        datasets: [{
                            data: processed.map(i => i.pct),
                            backgroundColor: '#002452'
                        }]
                    },
                    options: {
                        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            datalabels: { anchor: 'end', align: 'right', formatter: v => v + '%' }
                        }
                    }
                });

                // --- Rank Chart ---
                const counts = processed.reduce((acc, i) => { acc[i.italyRank] = (acc[i.italyRank] || 0) + 1; return acc; }, {});
                new Chart(document.getElementById('rankChart'), {
                    type: 'doughnut',
                    data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#002452', '#fdb913', '#2563eb', '#059669', '#dc2626'] }] }
                });

                // --- Table ---
                document.getElementById('tableBody').innerHTML = processed.map(i => `
                    <tr>
                        <td class="p-4">${i.eventYear}</td>
                        <td class="p-4 font-bold">${i.country}</td>
                        <td class="p-4">${i.totalReg}</td>
                        <td class="p-4 text-blue-600 font-bold">${i.pct}%</td>
                        <td class="p-4">${i.italyRank}</td>
                    </tr>
                `).join('');

            } catch(e) { console.error("Data Error:", e); }
        }
        init();
    </script>
</body>
</html>
