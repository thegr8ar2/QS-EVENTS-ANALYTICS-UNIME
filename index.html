<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS Events: Region of Interest - ITALY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { --qs-navy: #002452; --qs-yellow: #fdb913; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; }
        .chart-scroll-container { overflow-y: auto; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[1400px] mx-auto space-y-6">
        <header class="bg-[#002452] text-white p-8 rounded-xl border-b-4 border-[#fdb913]">
            <h1 class="text-3xl font-bold tracking-tight">QS Events: Region of Interest - ITALY</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                <h2 class="text-xl font-bold text-[#002452] mb-4">Regional Interest in Italy (%)</h2>
                <div class="chart-scroll-container flex-grow" id="interestScrollArea">
                    <div class="relative w-full" id="interestCanvasWrapper">
                        <canvas id="interestChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                <h2 class="text-xl font-bold text-[#002452] mb-1">Italy's Rank Distribution</h2>
                <div class="relative flex-grow">
                    <canvas id="rankChart"></canvas>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-5 border-b border-gray-200 bg-gray-50">
                <h2 class="text-lg font-bold text-[#002452]">Detailed Metrics Data</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="dataTable" style="min-width: 1000px;">
                    <thead class="bg-[#002452] text-white">
                        <tr>
                            <th class="p-4 uppercase text-xs">Year / Season</th>
                            <th class="p-4 uppercase text-xs">Country</th>
                            <th class="p-4 uppercase text-xs">Sample Pop.</th>
                            <th class="p-4 uppercase text-xs">Italy Interest</th>
                            <th class="p-4 uppercase text-xs">Rank</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        async function initDashboard() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Clean data: remove % and parse
                const processed = data.map(i => ({
                    ...i,
                    interestNum: parseFloat(String(i.italyInterest).replace('%', ''))
                })).sort((a, b) => b.interestNum - a.interestNum);

                renderCharts(processed);
                renderTable(processed);
            } catch(e) { console.error("Error loading:", e); }
        }

        function renderCharts(data) {
            // Main Interest Chart
            const wrapper = document.getElementById('interestCanvasWrapper');
            wrapper.style.height = (data.length * 45) + 'px';
            
            new Chart(document.getElementById('interestChart'), {
                type: 'bar',
                data: {
                    labels: data.map(i => i.country),
                    datasets: [{
                        data: data.map(i => ({ x: i.interestNum, total: i.totalReg })),
                        backgroundColor: '#002452',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false }, 
                        datalabels: { 
                            anchor: 'end', align: 'right',
                            formatter: (v) => `${v.x}% | ${v.total} Reg.`
                        } 
                    },
                    scales: { x: { display: false }, y: { grid: { display: false } } }
                }
            });

            // Rank Distribution
            const ranks = {};
            data.forEach(i => {
                const r = i.italyRank || 'Unranked';
                ranks[r] = (ranks[r] || 0) + 1;
            });
            new Chart(document.getElementById('rankChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ranks),
                    datasets: [{
                        data: Object.values(ranks),
                        backgroundColor: ['#002452', '#fdb913', '#2563eb', '#059669', '#ea580c', '#8b5cf6', '#db2777', '#0891b2']
                    }]
                }
            });
        }

        function renderTable(data) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = data.map(i => `
                <tr>
                    <td class="p-4">${i.eventYear}</td>
                    <td class="p-4 font-bold">${i.country}</td>
                    <td class="p-4">${i.totalReg}</td>
                    <td class="p-4 text-blue-600 font-bold">${i.italyInterest}</td>
                    <td class="p-4 font-bold">${i.italyRank}</td>
                </tr>
            `).join('');
        }

        initDashboard();
    </script>
</body>
</html>
